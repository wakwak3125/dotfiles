# ウィンドウのインデックスを1から始める
set -g base-index 1

# ペインのインデックスを1から始める
setw -g pane-base-index 1

# status line を更新する間隔を5秒にする
set-option -g status-interval 5

# 50000まで履歴をもつ
set-option -g history-limit 50000

# セッション破棄時に他のセッションへ自動切り替え
set-option -g detach-on-destroy off

# "main" セッションの破棄を禁止する
set-hook -g session-closed 'if-shell "! tmux has-session -t main 2>/dev/null" "new-session -d -s main"'

# Neovim連携: focus-events を有効化
set -g focus-events on

# ================================================
# keybind
# ================================================

# prefixキーをC-tに変更する
set -g prefix C-t

# C-bのキーバインドを解除する
unbind C-b

# キーストロークのディレイを減らす
set -sg escape-time 1

# 設定ファイルをリロードする
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded!"

# マウス操作を有効にする
setw -g mouse on

# viのキーバインドを使用する
setw -g mode-keys vi

# 'v' で選択を始める
bind -T copy-mode-vi v send -X begin-selection

# fzf コマンドパレット風ウィンドウスイッチャー (画面下部にトグル表示)
bind w run-shell "~/.local/bin/tmux-toggle-pane switcher -h 40% -- ~/.local/bin/tmux-switcher"

# fzf git ブランチスイッチャー (画面下部にトグル表示)
bind B run-shell "~/.local/bin/tmux-toggle-pane branch -h 40% -- ~/.local/bin/tmux-git-switch"

# fzf ghq リポジトリスイッチャー (画面下部にトグル表示)
bind g run-shell "~/.local/bin/tmux-toggle-pane repo -h 40% -- ~/.local/bin/tmux-repo-switch"

# fzf git worktree スイッチャー (画面下部にトグル表示)
bind W run-shell "~/.local/bin/tmux-toggle-pane worktree -h 40% -- ~/.local/bin/tmux-worktree-switch"

# fzf ファイルセレクター (検索モード / ctrl-/ でツリーモード切替)
bind f display-popup -E -w 85% -h 75% "~/.local/bin/tmux-file-select"
# fzf ファイルセレクター (ツリーモードで開始)
bind F display-popup -E -w 85% -h 75% "~/.local/bin/tmux-file-select tree"

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Panes control
bind-key -n S-Left select-pane -L
bind-key -n S-Right select-pane -R
bind-key -n S-Up select-pane -U
bind-key -n S-Down select-pane -D

# Windows control (Alt+←/→) / Sessions control (Alt+↑/↓)
bind-key -n M-Left previous-window
bind-key -n M-Right next-window
bind-key -n M-Up switch-client -p
bind-key -n M-Down switch-client -n

# 新規ペイン作成時に現在のディレクトリを維持する
# 画面分割のショートカットキーを|/-に変更
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"

set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# ================================================
# Appearance
# ================================================

# 256色端末を使用する
# set-option -g default-terminal screen-256color
# set -g terminal-overrides 'xterm:colors=256'
# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",alacritty:RGB"

# アクティブなペインのみ白っぽく変更（真っ黒は232）
# set -g window-style 'bg=colour239'
# set -g window-active-style 'bg=colour234'

# activity 監視はするがメッセージ通知は出さない (status の色変化だけで足りる)
set-window-option -g monitor-activity on
set -g visual-activity off
# ベルは無効化 (Ghostty のベルアイコン誤発火を防ぐ)
set-window-option -g monitor-bell off
set -g bell-action none
set -g visual-bell off

set -g status-left-length 100
set -g status-right-length 100

#set -g @nord_tmux_show_status_content "0"
#set -g @nord_tmux_no_patched_font "1"
# precmd フックでブランチ名ベースの命名を行うため automatic-rename は無効化
set -g automatic-rename off

# ================================================
# Plugins
# ================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'off'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin "nordtheme/tmux"
set -g @plugin 'hiroppy/tmux-agent-sidebar'

run-shell 'if [ -d /opt/homebrew/bin ]; then tmux set-environment -g PATH "$HOME/.local/share/mise/shims:$HOME/.local/bin:/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"; else tmux set-environment -g PATH "$HOME/.local/share/mise/shims:$HOME/.local/bin:/usr/local/bin:/bin:/usr/bin"; fi'
run-shell '~/.tmux/plugins/tpm/tpm'

# プラグイン読み込み後にキーバインドを上書き
# (tmux-pain-control が c を new-window に割り当てるため)
bind C new-window -c "#{pane_current_path}"
bind c display-popup -E -w 80% -h 30% "~/.local/bin/claude-status dashboard"

# ================================================
# Window status (Nord theme override)
# 戦略: status-bg を brightblack に揃え、inactive は status-bg と一体化させる。
#       current のみ Powerline アローで cyan ブロックを浮かせ、tab 間の
#       "黒い隙間" (death angle) を排除する。
# ================================================
set -g status-style "bg=brightblack,fg=white"
# activity/bell の reverse スタイルを解除 (cyan ブロックと混同して死角に見えるため)
set -gw window-status-activity-style "fg=yellow,bg=brightblack,bold"
set -gw window-status-bell-style "fg=red,bg=brightblack,bold"
set -g window-status-separator ''
set -gw window-status-format         "#[fg=white,bg=brightblack] #I #W#{?window_flags,#F, } "
set -gw window-status-current-format "#[fg=brightblack,bg=cyan,nobold,noitalics,nounderscore]#[fg=black,bg=cyan,bold] #I #W#{?window_flags,#F, }#[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]"

# status-left / status-right は status-bg=brightblack に合わせて trailing/leading を再設定
set -g status-left "#[fg=black,bg=blue,bold] #S #[fg=blue,bg=brightblack,nobold,noitalics,nounderscore]"
set -g status-right "#{prefix_highlight}#[fg=white,bg=brightblack] %Y-%m-%d #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]#[fg=black,bg=cyan,bold] #H "

